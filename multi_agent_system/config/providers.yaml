llm:
  providers:
    openai:
      enabled: false
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4"
      priority: 1
      config:
        base_url: "https://api.openai.com/v1"

    anthropic:
      enabled: false
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-3-sonnet-20240229"
      priority: 2
      config:
        anthropic_version: "2023-06-01"

    google:
      enabled: false
      api_key: "${GOOGLE_API_KEY}"
      model: "gemini-pro"
      priority: 3
      config: {}

    openrouter:
      enabled: false
      api_key: "${OPENROUTER_API_KEY}"
      model: "anthropic/claude-3-sonnet"
      priority: 4
      config:
        app_name: "MultiAgentSystem"

    minimax:
      enabled: true
      api_key: "${MINIMAX_API_KEY}"
      model: "${LLM_MODEL}"
      priority: 1
      config:
        base_url: "${MINIMAX_BASE_URL}"

  default_provider: "minimax"
  fallback_enabled: false
  retry_count: 3

  # Temperature settings
  default_temperature: 0.7
  max_tokens: 4096

# Execution mode: "docker" (isolated container) or "direct" (host filesystem)
execution:
  mode: "docker"
  workspace: ""  # Empty = default agent_workspace; set to absolute path for existing projects
